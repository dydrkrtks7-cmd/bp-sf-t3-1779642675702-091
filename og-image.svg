<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="739" cy="209" r="51" fill="#16213e" opacity="0.11"/>
    <circle cx="1223" cy="557" r="73" fill="#16213e" opacity="0.20"/>
    <circle cx="1057" cy="595" r="98" fill="#16213e" opacity="0.15"/>
    <circle cx="132" cy="509" r="31" fill="#16213e" opacity="0.09"/>
    <circle cx="464" cy="532" r="20" fill="#16213e" opacity="0.10"/>
    <circle cx="1116" cy="-22" r="78" fill="#16213e" opacity="0.15"/>
    <rect x="1139" y="666" width="77" height="78" rx="8" fill="#1a1a2e" opacity="0.09" transform="rotate(44, 64, 669)"/>
    <rect x="1049" y="705" width="24" height="39" rx="8" fill="#1a1a2e" opacity="0.11" transform="rotate(14, 1054, 693)"/>
    <rect x="617" y="189" width="64" height="81" rx="8" fill="#1a1a2e" opacity="0.07" transform="rotate(25, 1143, 683)"/>
    <rect x="1230" y="17" width="80" height="79" rx="8" fill="#1a1a2e" opacity="0.07" transform="rotate(34, 1109, 660)"/>
    <rect x="313" y="680" width="86" height="72" rx="8" fill="#1a1a2e" opacity="0.12" transform="rotate(33, 1233, 399)"/>
    <rect x="828" y="581" width="40" height="74" rx="8" fill="#1a1a2e" opacity="0.09" transform="rotate(39, 413, 258)"/>
    <rect x="736" y="59" width="37" height="74" rx="8" fill="#1a1a2e" opacity="0.14" transform="rotate(38, 982, 604)"/>
    <rect x="481" y="49" width="94" height="44" rx="8" fill="#1a1a2e" opacity="0.06" transform="rotate(4, 971, -48)"/>
    <polygon points="188,-40 223,30 153,30" fill="#16213e" opacity="0.05"/>
    <polygon points="-19,187 38,301 -76,301" fill="#16213e" opacity="0.08"/>
    <polygon points="970,246 1001,308 939,308" fill="#16213e" opacity="0.08"/>
    <polygon points="837,108 878,190 796,190" fill="#16213e" opacity="0.09"/>

  <!-- Wave at bottom -->
  <path d="M0,536 C360,583 840,489 1200,536 L1200,630 L0,630Z" fill="#16213e" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    PBN 빌더
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 프록시 보안
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#e94560" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#e94560" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 PBN 빌더 — 프록시 보안
  </text>
</svg>